<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機械稼働タイムテーブル</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --row-h: 80px;
    --label-w: 168px;
    --slot-px: 30px;   /* 15分 = 1マス */
    --slots: 40;       /* 08:00〜18:00 = 40スロット */
    --tl-w: calc(var(--slot-px) * var(--slots)); /* 1200px */
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --surface: #ffffff;
    --bg: #f1f5f9;
    --border: #e2e8f0;
    --border-mid: #cbd5e1;
    --border-strong: #94a3b8;
    --text: #1e293b;
    --muted: #64748b;
    --danger: #ef4444;
    --danger-light: #fef2f2;
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── アプリヘッダー ── */
  .app-header {
    background: var(--accent);
    color: #fff;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.22);
  }
  .app-header svg { flex-shrink: 0; }
  .app-header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .04em; }
  .app-header .date-badge {
    margin-left: auto;
    background: rgba(255,255,255,.18);
    border-radius: 8px;
    padding: 4px 14px;
    font-size: .9rem;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── メインエリア ── */
  .main {
    padding: 20px 20px 80px;
    max-width: 1280px;
    margin: 0 auto;
  }

  /* ── ツールバー ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .date-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border-radius: 12px;
    padding: 6px 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,.08);
  }
  .date-nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    width: 34px; height: 34px;
    border-radius: 8px;
    font-size: 1.15rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: background .1s, color .1s;
  }
  .date-nav-btn:hover { background: var(--accent-light); color: var(--accent); }
  .date-input {
    border: none;
    background: transparent;
    font-size: .95rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    padding: 4px 6px;
    border-radius: 6px;
    transition: background .1s;
  }
  .date-input:focus { outline: none; background: var(--accent-light); }
  .btn-add-machine {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 9px 18px;
    font-size: .9rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
    font-family: inherit;
  }
  .btn-add-machine:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  /* ── チャートカード ── */
  .chart-card {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 2px 20px rgba(0,0,0,.09);
    /* overflow: hidden は外さない → chart-scroll 内のスティッキーは chart-scroll 基準 */
  }

  /* ── 横スクロールラッパー ── */
  .chart-scroll {
    overflow-x: auto;
    border-radius: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
  }
  .chart-scroll::-webkit-scrollbar { height: 7px; }
  .chart-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 0 0 16px 16px; }
  .chart-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .chart-scroll::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* チャート全体の最小幅（ラベル + タイムライン） */
  .chart-inner {
    min-width: calc(var(--label-w) + var(--tl-w));
  }

  /* ── 時間軸ヘッダー ── */
  .chart-header {
    display: flex;
    border-bottom: 2px solid var(--border-strong);
    background: #f0f4f8;
  }
  .corner {
    width: var(--label-w);
    min-width: var(--label-w);
    flex-shrink: 0;
    border-right: 3px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    color: var(--muted);
    font-size: .8rem;
    font-weight: 700;
    letter-spacing: .05em;
    /* 横スクロール中も機械名列の上に留まる */
    position: sticky;
    left: 0;
    z-index: 30;
    background: #eef2f7;
    /* absolute な子要素の基準にする */
    overflow: visible;
  }

  /* ── 機械名列リサイズハンドル ── */
  .resize-handle {
    position: absolute;
    top: 0;
    /* 右ボーダー(3px)の中央に重なる位置 */
    right: -4px;
    width: 8px;
    height: 100%;
    cursor: col-resize;
    z-index: 1;
    /* ドラッグ中にテキスト選択が起きないよう */
    touch-action: none;
  }
  /* インジケーター：ドラッグ可能であることを示す細い縦バー */
  .resize-handle::before {
    content: '';
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 60%;
    border-radius: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity .2s;
  }
  .resize-handle:hover::before,
  .resize-handle.is-resizing::before { opacity: 1; }
  /* ドラッグ中はページ全体のカーソルを固定 */
  body.col-resizing,
  body.col-resizing * { cursor: col-resize !important; user-select: none !important; }

  /* 時間軸ラッパー（2段構成） */
  .time-axis-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: var(--tl-w);
  }

  /* 上段：時刻ラベル（1時間単位） */
  .time-axis-hours {
    display: flex;
    background: #eef2f7;
    border-bottom: 1px solid var(--border-mid);
  }
  .time-hour-cell {
    width: calc(var(--slot-px) * 4); /* 120px = 4スロット */
    min-width: calc(var(--slot-px) * 4);
    flex-shrink: 0;
    padding: 5px 8px;
    font-size: .78rem;
    font-weight: 800;
    color: var(--accent);
    border-right: 2px solid var(--border-mid);
    white-space: nowrap;
    user-select: none;
  }
  .time-hour-cell:last-child { border-right: none; }

  /* 下段：15分刻みティック */
  .time-axis-mins {
    display: flex;
    background: #f8fafc;
  }
  .time-min-cell {
    width: var(--slot-px);
    min-width: var(--slot-px);
    flex-shrink: 0;
    padding: 4px 0 3px;
    font-size: .6rem;
    font-weight: 500;
    text-align: center;
    color: var(--muted);
    border-right: 1px dashed var(--border);
    user-select: none;
  }
  .time-min-cell:last-child { border-right: none; }
  .time-min-cell.at-hour {
    font-weight: 800;
    color: var(--text);
    border-right: 2px solid var(--border-strong);
  }
  .time-min-cell.at-half {
    font-weight: 600;
    color: #475569;
    border-right: 1px solid var(--border-mid);
  }

  /* ── 機械行 ── */
  .machine-row {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .machine-row:last-child { border-bottom: none; }

  /* 機械ラベル列（横スクロール中もスティッキー） */
  .machine-label {
    width: var(--label-w);
    min-width: var(--label-w);
    flex-shrink: 0;
    border-right: 3px solid var(--border-strong);
    display: flex;
    align-items: center;
    padding: 0 10px 0 14px;
    gap: 8px;
    background: #f8fafc;
    position: sticky;
    left: 0;
    z-index: 20;
    /* 細い右影で「固定列」感を演出 */
    box-shadow: 2px 0 6px -2px rgba(0,0,0,.1);
  }
  .machine-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem;
    flex-shrink: 0;
  }
  .machine-name {
    font-size: .88rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .machine-delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    width: 24px; height: 24px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: .8rem;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .15s, background .1s, color .1s;
  }
  .machine-row:hover .machine-delete-btn { opacity: 1; }
  .machine-delete-btn:hover { background: var(--danger-light); color: var(--danger); }

  .machine-edit-btn {
    background: none;
    border: none;
    cursor: pointer;
    width: 24px; height: 24px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .15s, background .1s, color .1s;
  }
  .machine-row:hover .machine-edit-btn { opacity: 1; }
  .machine-edit-btn:hover { background: var(--accent-light); color: var(--accent); }

  /* インライン編集中の入力欄 */
  .machine-name-input {
    flex: 1;
    min-width: 0;
    font-size: .88rem;
    font-weight: 700;
    color: var(--text);
    border: 2px solid var(--accent);
    border-radius: 6px;
    padding: 3px 6px;
    background: #fff;
    font-family: inherit;
  }
  .machine-name-input:focus { outline: none; }
  .machine-name-input.has-error { border-color: var(--danger); }

  /* ── タイムライン（40列グリッド） ── */
  .timeline {
    /* 40スロット × 30px = 1200px 固定グリッド */
    display: grid;
    grid-template-columns: repeat(var(--slots), var(--slot-px));
    position: relative;
    min-height: var(--row-h);
    background-color: #fff;
  }

  /* 15分スロットセル */
  .hour-slot {
    min-height: var(--row-h);
    border-right: 1px dashed var(--border);
    cursor: crosshair;
    transition: background .1s;
  }
  .hour-slot:hover { background: var(--accent-light); }
  .hour-slot:last-child { border-right: none; }
  /* 30分境界：やや濃いライン */
  .hour-slot.at-half { border-right: 1px solid var(--border-mid); }
  /* 時間境界：強いライン */
  .hour-slot.at-hour { border-right: 2px solid var(--border-strong); }
  /* 偶数時間帯に背景を微妙に変えて視認性UP */
  .hour-slot.even-hour { background-color: #fafbfc; }
  .hour-slot.even-hour:hover { background: var(--accent-light); }

  /* ── 作業ブロック ── */
  .task-block {
    position: absolute;
    top: 8px; bottom: 8px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    cursor: pointer;
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,.13);
    transition: transform .1s, box-shadow .1s;
    overflow: hidden;
    z-index: 10;
    min-width: 4px; /* 極小ブロックでも表示 */
  }
  .task-block:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 16px rgba(0,0,0,.2);
  }
  .task-block:active { transform: translateY(0); }
  /* 複数日作業 */
  .task-block.is-multiday { opacity: .93; }
  .task-block.has-prev { border-left: none; border-radius: 0 9px 9px 0; }
  .task-block.has-next { border-right: none; border-radius: 9px 0 0 9px; }
  .task-block.has-prev.has-next { border-radius: 0; }
  .task-block.has-prev::before {
    content: '◄';
    font-size: .55rem;
    opacity: .5;
    position: absolute;
    left: 3px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }
  .task-block.has-next::after {
    content: '►';
    font-size: .55rem;
    opacity: .5;
    position: absolute;
    right: 3px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }
  .multiday-days-info {
    font-size: .78rem;
    color: var(--accent);
    font-weight: 700;
    margin-top: 6px;
    min-height: 1.1em;
  }
  .task-inner {
    pointer-events: none;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .task-name {
    font-size: .85rem;
    font-weight: 700;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-time {
    font-size: .7rem;
    opacity: .75;
    display: block;
    margin-top: 1px;
  }

  /* 色テーマ */
  .color-blue   { background: #bfdbfe; color: #1e40af; border-left: 4px solid #3b82f6; }
  .color-green  { background: #bbf7d0; color: #166534; border-left: 4px solid #22c55e; }
  .color-amber  { background: #fde68a; color: #92400e; border-left: 4px solid #f59e0b; }
  .color-rose   { background: #fecdd3; color: #9f1239; border-left: 4px solid #f43f5e; }
  .color-purple { background: #e9d5ff; color: #6b21a8; border-left: 4px solid #a855f7; }

  /* 機械なし空状態 */
  .empty-machines {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 56px 24px;
    gap: 10px;
    color: var(--muted);
  }
  .empty-machines .empty-icon { font-size: 2.8rem; }
  .empty-machines p { font-size: .92rem; font-weight: 600; }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 60px; height: 60px;
    font-size: 2rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(37,99,235,.45);
    transition: transform .15s, box-shadow .15s;
    z-index: 100;
  }
  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(37,99,235,.55); }

  /* ── 凡例 ── */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 14px;
    align-items: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: .8rem; color: var(--muted); font-weight: 600;
  }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .legend-hint {
    margin-left: auto;
    font-size: .76rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── モーダル共通 ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,23,42,.46);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.26);
    width: 100%;
    max-width: 440px;
    animation: slideUp .2s ease;
    max-height: 92vh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(24px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-header {
    padding: 20px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; background: var(--surface); z-index: 1;
    border-radius: 20px 20px 0 0;
  }
  .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
  .modal-close {
    margin-left: auto;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.5rem; line-height: 1;
    padding: 4px; border-radius: 6px;
    transition: background .1s;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 20px 24px; }

  /* フォーム */
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: .84rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: .02em;
  }
  .form-group select,
  .form-group input[type="text"],
  .form-group input[type="time"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 1rem;
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    background: var(--surface);
    transition: border-color .15s;
    font-family: inherit;
  }
  .form-group select:focus,
  .form-group input:focus { outline: none; border-color: var(--accent); }
  .time-row { display: flex; gap: 12px; }
  .time-row .form-group { flex: 1; }

  /* 色・アイコン選択 */
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-opt {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform .1s, border-color .1s;
  }
  .color-opt:hover { transform: scale(1.1); }
  .color-opt.selected { border-color: var(--text); transform: scale(1.12); }
  .color-opt[data-c="blue"]   { background: #3b82f6; }
  .color-opt[data-c="green"]  { background: #22c55e; }
  .color-opt[data-c="amber"]  { background: #f59e0b; }
  .color-opt[data-c="rose"]   { background: #f43f5e; }
  .color-opt[data-c="purple"] { background: #a855f7; }

  .icon-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .icon-opt {
    width: 42px; height: 42px;
    border-radius: 10px;
    border: 2.5px solid transparent;
    cursor: pointer;
    font-size: 1.25rem;
    display: flex; align-items: center; justify-content: center;
    background: #f1f5f9;
    transition: border-color .1s, transform .1s, background .1s;
  }
  .icon-opt:hover { background: var(--accent-light); transform: scale(1.08); }
  .icon-opt.selected { border-color: var(--accent); transform: scale(1.1); background: var(--accent-light); }

  /* ── 「なし」オプション（テキストボタン） ── */
  .icon-opt-none {
    width: auto;
    min-width: 48px;
    padding: 0 10px;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .03em;
    color: var(--muted);
    background: #f1f5f9;
    border: 2.5px dashed var(--border-mid);
  }
  .icon-opt-none:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    border-style: dashed;
    color: var(--accent);
    transform: scale(1.05);
  }
  .icon-opt-none.selected {
    border-style: solid;
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    transform: scale(1.05);
  }

  .iconbg-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .iconbg-opt {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform .1s, border-color .1s;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
  }
  .iconbg-opt:hover { transform: scale(1.1); }
  .iconbg-opt.selected { border-color: var(--text); transform: scale(1.12); }

  /* ボタン */
  .btn-row { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    flex: 1;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background .15s, transform .1s;
    font-family: inherit;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #dc2626; }

  /* 詳細モーダル */
  .detail-field {
    background: #f8fafc;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 12px;
  }
  .detail-field .lbl { font-size: .75rem; color: var(--muted); font-weight: 700; margin-bottom: 2px; }
  .detail-field .val { font-size: 1rem; font-weight: 600; color: var(--text); }

  .error-msg { color: var(--danger); font-size: .82rem; margin-top: 6px; display: none; }
  .error-msg.show { display: block; }

  /* ── 入力履歴サジェスト ── */
  .suggest-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .suggest-chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 11px;
    font-size: .76rem;
    font-weight: 600;
    color: var(--muted);
    background: #f1f5f9;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background .1s, color .1s, border-color .1s, transform .08s;
  }
  .suggest-chip:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .suggest-chip:active { transform: translateY(0) scale(.97); }

  /* ── ログイン画面 ── */
  #loginOverlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(145deg, #1e3a8a 0%, #2563eb 100%);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    transition: opacity .4s ease;
  }
  #loginOverlay.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  .login-card {
    background: #fff;
    border-radius: 24px;
    padding: 48px 40px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,.35);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .login-logo { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .login-logo h1 { font-size: 1.25rem; font-weight: 800; color: var(--text); text-align: center; }
  .login-logo p  { font-size: .85rem; color: var(--muted); text-align: center; }
  .login-input-wrap {
    width: 100%;
    position: relative;
  }
  .login-input {
    width: 100%;
    padding: 18px 52px 18px 20px;
    font-size: 1.2rem;
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    letter-spacing: .15em;
    text-align: center;
    transition: border-color .15s;
  }
  .login-input:focus { outline: none; border-color: var(--accent); }
  .login-pw-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 6px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color .15s, background .1s;
  }
  .login-pw-toggle:hover { color: var(--accent); background: var(--accent-light); }
  .login-input.has-error {
    border-color: var(--danger);
    animation: loginShake .3s ease;
  }
  @keyframes loginShake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-8px); }
    75%      { transform: translateX(8px); }
  }
  .login-btn {
    width: 100%;
    padding: 18px;
    font-size: 1.1rem;
    font-weight: 800;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: .05em;
    transition: background .15s, transform .1s;
  }
  .login-btn:hover  { background: #1d4ed8; }
  .login-btn:active { transform: scale(.98); }
  .login-error {
    color: var(--danger);
    font-size: .9rem;
    font-weight: 700;
    text-align: center;
    min-height: 1.3em;
  }

  /* ── ナビゲーションタブ ── */
  .app-nav {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    display: flex;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 4px rgba(0,0,0,.06);
    overflow-x: auto;
  }
  .nav-tab {
    padding: 13px 20px;
    font-size: .88rem;
    font-weight: 600;
    font-family: inherit;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    margin-bottom: -2px;
    white-space: nowrap;
    letter-spacing: .02em;
  }
  .nav-tab:hover { color: var(--accent); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── 月次ガントチャート ── */
  .month-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .month-title {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--text);
    min-width: 130px;
    text-align: center;
  }
  .month-nav-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    transition: background .12s, border-color .12s;
  }
  .month-nav-btn:hover { background: var(--accent-light); border-color: var(--accent); }
  .month-today-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: .85rem;
    font-weight: 600;
    font-family: inherit;
    color: var(--muted);
    cursor: pointer;
    transition: background .12s, color .12s;
    margin-left: 4px;
  }
  .month-today-btn:hover { background: var(--accent-light); color: var(--accent); }

  /* ガントヘッダー行 */
  .month-gtt-header {
    display: flex;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 2px solid var(--border-mid);
  }
  .month-axis { display: flex; }
  .month-day-hdr {
    width: 48px;
    flex-shrink: 0;
    padding: 4px 2px 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    font-size: .68rem;
    font-weight: 700;
    color: var(--muted);
    border-left: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    transition: background .1s;
    user-select: none;
  }
  .month-day-hdr:hover { background: var(--accent-light); color: var(--accent); }
  .month-day-hdr .mday-num { font-size: .82rem; font-weight: 800; color: var(--text); }
  .month-day-hdr.is-today  { background: var(--accent-light); color: var(--accent); }
  .month-day-hdr.is-today .mday-num { color: var(--accent); }
  .month-day-hdr.is-selected { background: var(--accent); color: #fff; }
  .month-day-hdr.is-selected .mday-num { color: #fff; }
  .month-day-hdr.dow-sun { color: #ef4444; }
  .month-day-hdr.dow-sun .mday-num { color: #ef4444; }
  .month-day-hdr.dow-sat { color: #3b82f6; }
  .month-day-hdr.dow-sat .mday-num { color: #3b82f6; }

  /* ガント機械行 */
  .month-machine-row {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .month-timeline-row { display: flex; flex: 1; }
  .month-day-slot {
    width: 48px;
    flex-shrink: 0;
    min-height: var(--row-h);
    padding: 3px 2px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 2px;
    cursor: pointer;
    transition: background .1s;
  }
  .month-day-slot:hover { background: var(--bg); }
  .month-day-slot.is-today-col    { background: #eff6ff; }
  .month-day-slot.is-selected-col { background: #dbeafe; }
  .month-day-slot.is-weekend-col  { background: #fafafa; }

  /* タスクチップ */
  .month-task-chip {
    width: 100%;
    font-size: .62rem;
    font-weight: 700;
    padding: 2px 4px;
    border-radius: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
    border: none;
    text-align: left;
    font-family: inherit;
    line-height: 1.45;
    display: block;
  }
  .month-task-chip:hover { filter: brightness(.9); }
  .month-task-more { font-size: .6rem; color: var(--muted); font-weight: 700; padding: 0 3px; line-height: 1.4; }

  /* ── 工番マスタ ── */
  .master-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .master-search {
    flex: 1; min-width: 180px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: .9rem;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    transition: border-color .15s;
  }
  .master-search:focus { outline: none; border-color: var(--accent); }
  .master-table-wrap {
    background: var(--surface);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    overflow: hidden;
  }
  .master-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  .master-table th {
    background: var(--bg);
    padding: 11px 14px;
    text-align: left;
    font-size: .77rem;
    font-weight: 700;
    color: var(--muted);
    border-bottom: 1.5px solid var(--border);
    white-space: nowrap;
  }
  .master-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .master-table tr:last-child td { border-bottom: none; }
  .master-table tr:hover td { background: var(--bg); }
  .master-koban-badge {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    font-size: .85rem;
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 6px;
    display: inline-block;
    letter-spacing: .04em;
  }
  .master-empty { text-align: center; padding: 48px 20px; color: var(--muted); font-size: .9rem; }
  .master-form-card {
    background: var(--surface);
    border-radius: 14px;
    border: 2px solid var(--accent);
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }
  .master-form-card.open { display: block; }
  .master-form-card h3 { font-size: .95rem; font-weight: 700; color: var(--text); margin-bottom: 14px; }
  .master-form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .master-form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
  .master-form-group label { font-size: .76rem; font-weight: 700; color: var(--muted); letter-spacing: .03em; }
  .master-form-group input {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .9rem;
    font-family: inherit;
    color: var(--text);
    transition: border-color .15s;
  }
  .master-form-group input:focus { outline: none; border-color: var(--accent); }
  .master-form-err { color: var(--danger); font-size: .8rem; font-weight: 700; margin-top: 8px; min-height: 1.2em; }
  .koban-hint { font-size: .78rem; color: var(--accent); font-weight: 600; margin-top: 4px; min-height: 1.1em; }

  /* ── レスポンシブ ── */
  @media (max-width: 700px) {
    :root { --label-w: 90px; --row-h: 68px; }
    .machine-name { font-size: .76rem; }
    .machine-icon { width: 28px; height: 28px; font-size: 1rem; }
    .app-header h1 { font-size: 1rem; }
    .main { padding: 12px 10px 80px; }
    .toolbar { gap: 8px; }
    .legend-hint { display: none; }
  }
</style>
</head>
<body>

<!-- ── ログイン画面 ── -->
<div id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <h1>機械稼働タイムテーブル</h1>
      <p>アクセスにはパスワードが必要です</p>
    </div>
    <div class="login-input-wrap">
      <input type="password" id="loginInput" class="login-input"
             placeholder="パスワードを入力" maxlength="50" autocomplete="current-password">
      <button type="button" class="login-pw-toggle" id="loginPwToggle" title="パスワードを表示">
        <svg id="eyeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">ログイン</button>
  </div>
</div>

<!-- ── アプリヘッダー ── -->
<header class="app-header">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
    <line x1="3" y1="10" x2="21" y2="10"/>
    <line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/>
    <line x1="8" y1="18" x2="10" y2="18"/>
  </svg>
  <h1>機械稼働タイムテーブル</h1>
  <div class="date-badge" id="todayBadge"></div>
</header>

<!-- ── ナビゲーションタブ ── -->
<nav class="app-nav">
  <button class="nav-tab active" data-view="timetable">📅 タイムテーブル</button>
  <button class="nav-tab" data-view="monthly">🗓 月次カレンダー</button>
  <button class="nav-tab" data-view="master">📋 工番マスタ</button>
</nav>

<!-- ── メインエリア ── -->
<main class="main">

  <!-- ── ビュー: タイムテーブル ── -->
  <div id="view-timetable" class="view-panel">

  <!-- ツールバー -->
  <div class="toolbar">
    <div class="date-nav">
      <button class="date-nav-btn" id="prevDay" title="前日">‹</button>
      <input type="date" class="date-input" id="dateInput">
      <button class="date-nav-btn" id="nextDay" title="翌日">›</button>
    </div>
    <button class="btn-add-machine" id="addMachineBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      機械を追加
    </button>
  </div>

  <!-- チャートカード -->
  <div class="chart-card">
    <div class="chart-scroll">
      <div class="chart-inner">

        <!-- 時間軸ヘッダー（2段） -->
        <div class="chart-header">
          <div class="corner">
            機械
            <div class="resize-handle" id="resizeHandle" title="ドラッグして幅を調整"></div>
          </div>
          <div class="time-axis-wrap">
            <div class="time-axis-hours" id="timeAxisHours"></div>
            <div class="time-axis-mins"  id="timeAxisMins"></div>
          </div>
        </div>

        <!-- 機械行エリア -->
        <div id="chartBody"></div>

      </div><!-- /.chart-inner -->
    </div><!-- /.chart-scroll -->
  </div><!-- /.chart-card -->

  <!-- 凡例 -->
  <div class="legend">
    <span style="font-size:.8rem;font-weight:700;color:var(--muted);">色：</span>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>青</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>緑</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>黄</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f43f5e"></div>赤</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>紫</div>
    <span class="legend-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      空きセルをクリック → 作業追加　／　ブロックをクリック → 編集・削除
    </span>
  </div>

  </div><!-- /#view-timetable -->

  <!-- ── ビュー: 月次カレンダー ── -->
  <div id="view-monthly" class="view-panel" hidden>
    <div class="month-toolbar">
      <button class="month-nav-btn" id="prevMonth">‹</button>
      <span class="month-title" id="monthTitle"></span>
      <button class="month-nav-btn" id="nextMonth">›</button>
      <button class="month-today-btn" id="monthToday">今月</button>
    </div>
    <div class="chart-card">
      <div class="chart-scroll">
        <div class="chart-inner">
          <div class="month-gtt-header" id="monthHeader">
            <div class="corner">機械</div>
            <div class="month-axis" id="monthAxis"></div>
          </div>
          <div id="monthBody"></div>
        </div>
      </div>
    </div>
  </div><!-- /#view-monthly -->

  <!-- ── ビュー: 工番マスタ ── -->
  <div id="view-master" class="view-panel" hidden>
    <div class="master-toolbar">
      <input type="text" class="master-search" id="masterSearch" placeholder="工番・品名で検索…">
      <button class="btn btn-primary" id="masterAddBtn">＋ 工番を登録</button>
    </div>
    <div class="master-form-card" id="masterFormCard">
      <h3 id="masterFormTitle">工番を登録</h3>
      <div class="master-form-row">
        <div class="master-form-group">
          <label>工番</label>
          <input type="text" id="mfKoban" placeholder="例：K-001" maxlength="20">
        </div>
        <div class="master-form-group">
          <label>品名</label>
          <input type="text" id="mfProduct" placeholder="例：部品A" maxlength="30">
        </div>
        <div class="master-form-group" style="max-width:130px;">
          <label>標準時間（分）</label>
          <input type="number" id="mfStdMin" placeholder="120" min="1" max="9999">
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end;padding-bottom:1px;">
          <button class="btn btn-secondary" id="masterFormCancel">キャンセル</button>
          <button class="btn btn-primary" id="masterFormSave">保存</button>
        </div>
      </div>
      <div class="master-form-err" id="masterFormErr"></div>
    </div>
    <div class="master-table-wrap">
      <table class="master-table">
        <thead>
          <tr>
            <th>工番</th><th>品名</th><th>標準時間</th><th>実績回数</th><th>平均時間</th><th></th>
          </tr>
        </thead>
        <tbody id="masterTableBody"></tbody>
      </table>
    </div>
  </div><!-- /#view-master -->

</main>

<!-- ── FAB ── -->
<button class="fab" id="fabBtn" title="作業を追加">＋</button>

<!-- ── 作業追加モーダル ── -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-header">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <h2 id="addModalTitle">作業を追加</h2>
      <button class="modal-close" id="addClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>機械</label>
        <select id="fMachine"></select>
      </div>
      <div class="form-group">
        <label>作業名</label>
        <input type="text" id="fName" placeholder="例：ロット202製造" maxlength="30">
        <div class="error-msg" id="errName">作業名を入力してください</div>
        <div class="suggest-list" id="taskNameSuggests"></div>
      </div>
      <div class="form-group">
        <label>工番 <span style="font-size:.78rem;color:var(--muted);font-weight:400;">（任意）</span></label>
        <input type="text" id="fKoban" placeholder="例：K-001" maxlength="20">
        <div class="koban-hint" id="kobanHint"></div>
        <div class="suggest-list" id="kobanSuggests"></div>
      </div>
      <div class="time-row">
        <div class="form-group">
          <label>開始日</label>
          <input type="date" id="fStartDate">
        </div>
        <div class="form-group">
          <label>終了日</label>
          <input type="date" id="fEndDate">
        </div>
      </div>
      <div class="multiday-days-info" id="multidayInfo"></div>
      <div class="error-msg" id="errDate">終了日は開始日以降を入力してください</div>
      <div class="time-row">
        <div class="form-group">
          <label>開始時間</label>
          <!-- step="900" = 15分単位 -->
          <input type="time" id="fStart" min="08:00" max="18:00" step="900">
        </div>
        <div class="form-group">
          <label>終了時間</label>
          <input type="time" id="fEnd" min="08:00" max="18:00" step="900">

        08:00〜18:00 の範囲で、<strong>15分単位</strong>（:00 / :15 / :30 / :45）で入力してください

      <div class="error-msg" id="errOverlap">同じ機械に重複する作業があります</div>

          <div class="color-opt selected" data-c="blue"></div>
          <div class="color-opt" data-c="green"></div>
          <div class="color-opt" data-c="amber"></div>
          <div class="color-opt" data-c="rose"></div>

        <button class="btn btn-danger" id="addDelete" style="display:none">🗑 削除</button>
        <button class="btn btn-primary" id="addSave">追加する</button>

</div>

<!-- ── 機械追加モーダル ── -->
<div class="overlay" id="machineOverlay">
  <div class="modal">
    <div class="modal-header">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>

        <button class="btn btn-primary" id="machineSave">追加する</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   認証設定
   ↓ ここのパスワードを自由に書き換えてください ↓
═══════════════════════════════════════════════════════ */
const CORRECT_PASSWORD = "endo";

(function initAuth() {
  const overlay  = document.getElementById('loginOverlay');
  const input    = document.getElementById('loginInput');
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('loginError');

  function tryLogin() {
    if (input.value === CORRECT_PASSWORD) {
      errEl.textContent = '';
      overlay.classList.add('fade-out');
      setTimeout(() => { overlay.style.display = 'none'; }, 420);
    } else {
      errEl.textContent = 'パスワードが違います';
      input.classList.add('has-error');
      input.value = '';
      setTimeout(() => input.classList.remove('has-error'), 350);
      setTimeout(() => input.focus(), 10);
    }
  }

  btn.addEventListener('click', tryLogin);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  setTimeout(() => input.focus(), 100);

  /* ── パスワード表示トグル ── */
  const toggleBtn = document.getElementById('loginPwToggle');
  const eyeOpen = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const eyeOff  = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  toggleBtn.addEventListener('click', () => {
    const showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    toggleBtn.innerHTML = showing ? eyeOpen : eyeOff;
    toggleBtn.title     = showing ? 'パスワードを表示' : 'パスワードを隠す';
    input.focus();
  });
})();

/* ═══════════════════════════════════════════════════════
   タイムライン定数（15分単位）
═══════════════════════════════════════════════════════ */
const TIME_START   = 8;          // 開始時刻（時）
const TIME_END     = 18;         // 終了時刻（時）
const SLOT_MIN     = 15;         // 1スロット = 15分
const TOTAL_SLOTS  = (TIME_END - TIME_START) * 60 / SLOT_MIN; // 40スロット
const SLOT_PX      = 30;         // 1スロットのピクセル幅（CSS --slot-px と一致）

/* ═══════════════════════════════════════════════════════
   機械追加モーダル用プリセット
═══════════════════════════════════════════════════════ */
const ICON_OPTS  = ['🔩','⚙️','🏭','🔧','🛠️','🔨','💡','🚜','🤖','📦','🖥️','⚡'];
const ICONBG_OPTS = ['#dbeafe','#dcfce7','#fef9c3','#fce7f3',
                     '#ede9fe','#ffedd5','#cffafe','#f1f5f9'];

/* ═══════════════════════════════════════════════════════
   アプリ状態
═══════════════════════════════════════════════════════ */
let machines = [
  { id: 'press-a',    name: 'プレス機A',      icon: '🔩', iconBg: '#dbeafe' },
  { id: 'cut-b',      name: '切削機B',        icon: '⚙️', iconBg: '#dcfce7' },
  { id: 'assembly-1', name: '組み立てライン1', icon: '🏭', iconBg: '#fef9c3' },
];

// 全作業（日付またぎ対応フラット配列）: [{id, machineId, name, startDate, endDate, start, end, color, koban}, ...]
let allTasks = [];

let currentDate    = toDateKey(new Date());
let selectedColor  = 'blue';
let selectedIcon   = ICON_OPTS[0];
let selectedIconBg = ICONBG_OPTS[0];
let editingTaskId  = null;

/* ── サンプルデータ ── */
allTasks = [
  { id: uid(), machineId: 'press-a',    name: 'ロット101製造',    startDate: currentDate, endDate: currentDate, start: '09:00', end: '11:30', color: 'blue'   },
  { id: uid(), machineId: 'press-a',    name: '段取り替え',        startDate: currentDate, endDate: currentDate, start: '13:15', end: '14:00', color: 'amber'  },
  { id: uid(), machineId: 'cut-b',      name: '定期メンテナンス',  startDate: currentDate, endDate: currentDate, start: '13:00', end: '15:15', color: 'rose'   },
  { id: uid(), machineId: 'assembly-1', name: 'ロット202組立',     startDate: currentDate, endDate: currentDate, start: '08:30', end: '12:00', color: 'green'  },
  { id: uid(), machineId: 'assembly-1', name: '品質検査',          startDate: currentDate, endDate: currentDate, start: '15:45', end: '17:30', color: 'purple' },
];

/* ═══════════════════════════════════════════════════════
   ユーティリティ
═══════════════════════════════════════════════════════ */
function uid() { return Math.random().toString(36).slice(2, 10); }

function toDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/** 指定日に重なる全作業（startDate ≤ dateKey ≤ endDate） */
function getTasksForDate(dateKey) {
  return allTasks.filter(t => t.startDate <= dateKey && t.endDate >= dateKey);
}

/** 選択日のタスク */
function currentTasks() {
  return getTasksForDate(currentDate);
}

/** 作業の実質分数（複数日は作業日 × 10h + 端数） */
function taskDurationMin(t) {
  const days = Math.round((new Date(t.endDate + 'T00:00') - new Date(t.startDate + 'T00:00')) / 86400000);
  return days * (TIME_END - TIME_START) * 60 + timeToMin(t.end) - timeToMin(t.start);
}

/** "HH:MM" → 分数 */
function timeToMin(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + (m || 0);
}

/** "HH:MM" → スロットインデックス（0 = 08:00） */
function timeToSlot(t) {
  return (timeToMin(t) - TIME_START * 60) / SLOT_MIN;
}

/** スロットインデックス → "HH:MM" */
function slotToTimeStr(slotIdx) {
  const total = TIME_START * 60 + slotIdx * SLOT_MIN;
  return `${String(Math.floor(total / 60)).padStart(2,'0')}:${String(total % 60).padStart(2,'0')}`;
}

/** 時刻が15分境界かチェック */
function is15minAligned(t) {
  if (!t) return false;
  return timeToMin(t) % SLOT_MIN === 0;
}

function showErr(id) { document.getElementById(id).classList.add('show'); }
function clearErrors(...ids) { ids.forEach(id => document.getElementById(id).classList.remove('show')); }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════
   入力履歴（LocalStorage）管理
═══════════════════════════════════════════════════════ */
const HISTORY_MAX    = 10;
const LS_TASK_KEY    = 'fst_task_history';
const LS_MACHINE_KEY = 'fst_machine_history';
const LS_KOBAN_KEY   = 'fst_koban_master';
const COLOR_HEX      = { blue:'#3b82f6', green:'#22c55e', amber:'#f59e0b', rose:'#f43f5e', purple:'#a855f7' };

/** LocalStorage から履歴配列を読み込む */
function loadHistory(key) {
  try { return JSON.parse(localStorage.getItem(key) || '[]'); }
  catch { return []; }
}

/**
 * 値を履歴の先頭に追加する。
 * 重複は除去して最新を先頭に、10件超は末尾から削除。
 */
function saveToHistory(key, value) {
  if (!value) return;
  let hist = loadHistory(key).filter(v => v !== value);
  hist.unshift(value);
  hist = hist.slice(0, HISTORY_MAX);
  try { localStorage.setItem(key, JSON.stringify(hist)); }
  catch { /* ストレージ満杯などは無視 */ }
}

/**
 * 履歴チップを描画し、クリックで対象 input に値をセットする。
 * @param {string} listId   チップを表示する要素の id
 * @param {string} key      LocalStorage のキー
 * @param {string} inputId  値を流し込む input の id
 */
function renderSuggests(listId, key, inputId) {
  const list = document.getElementById(listId);
  if (!list) return;
  const hist = loadHistory(key);
  list.innerHTML = '';
  hist.forEach(item => {
    const chip = document.createElement('button');
    chip.type      = 'button';
    chip.className = 'suggest-chip';
    chip.textContent = item;
    chip.title     = item;
    chip.addEventListener('click', () => {
      document.getElementById(inputId).value = item;
      document.getElementById(inputId).focus();
    });
    list.appendChild(chip);
  });
}

/* ═══════════════════════════════════════════════════════
   工番マスタ ユーティリティ
═══════════════════════════════════════════════════════ */
function loadKobanMaster() {
  try { return JSON.parse(localStorage.getItem(LS_KOBAN_KEY) || '{}'); }
  catch { return {}; }
}
function saveKobanMaster(data) {
  try { localStorage.setItem(LS_KOBAN_KEY, JSON.stringify(data)); } catch {}
}

function getKobanRecords(koban) {
  return allTasks
    .filter(t => t.koban === koban)
    .map(t => ({ duration: taskDurationMin(t) }));
}

function minToHM(min) {
  const h = Math.floor(min / 60), m = min % 60;
  if (h === 0) return `${m}分`;
  if (m === 0) return `${h}時間`;
  return `${h}時間${m}分`;
}

function renderKobanSuggests() {
  const master = loadKobanMaster();
  const list = document.getElementById('kobanSuggests');
  if (!list) return;
  list.innerHTML = '';
  Object.values(master)
    .sort((a, b) => a.koban.localeCompare(b.koban, 'ja'))
    .forEach(k => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'suggest-chip';
      chip.textContent = `${k.koban}：${k.productName}`;
      chip.title = k.koban;
      chip.addEventListener('click', () => {
        const inp = document.getElementById('fKoban');
        inp.value = k.koban;
        inp.dispatchEvent(new Event('input'));
        inp.focus();
      });
      list.appendChild(chip);
    });
}

/* ═══════════════════════════════════════════════════════
   日付バッジ
═══════════════════════════════════════════════════════ */
function updateDateBadge(dateKey) {
  const d = new Date(dateKey + 'T00:00:00');
  document.getElementById('todayBadge').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;
}

/* ═══════════════════════════════════════════════════════
   時間軸ヘッダー生成（2段）
═══════════════════════════════════════════════════════ */
function buildTimeAxis() {
  /* ── 上段：時刻ラベル（1時間単位） ── */
  const hoursRow = document.getElementById('timeAxisHours');
  hoursRow.innerHTML = '';
  for (let h = TIME_START; h < TIME_END; h++) {
    const cell = document.createElement('div');
    cell.className = 'time-hour-cell';
    cell.textContent = `${String(h).padStart(2,'0')}:00`;
    hoursRow.appendChild(cell);
  }

  /* ── 下段：15分ティック ── */
  const minsRow = document.getElementById('timeAxisMins');
  minsRow.innerHTML = '';
  for (let s = 0; s < TOTAL_SLOTS; s++) {
    const mn = (TIME_START * 60 + s * SLOT_MIN) % 60;
    const cell = document.createElement('div');
    cell.className = 'time-min-cell';
    if (mn === 0)  cell.classList.add('at-hour');
    if (mn === 30) cell.classList.add('at-half');
    cell.textContent = String(mn).padStart(2, '0');
    minsRow.appendChild(cell);
  }
}

/* ═══════════════════════════════════════════════════════
   チャート本体描画
═══════════════════════════════════════════════════════ */
function buildChart() {
  const body = document.getElementById('chartBody');
  body.innerHTML = '';

  if (machines.length === 0) {
    body.innerHTML = `
      <div class="empty-machines">
        <div class="empty-icon">🏗️</div>
        <p>機械がありません。「機械を追加」ボタンで追加してください。</p>
      </div>`;
    return;
  }

  machines.forEach(m => {
    const row = document.createElement('div');
    row.className = 'machine-row';

    /* ── ラベル列（スティッキー） ── */
    const lbl = document.createElement('div');
    lbl.className = 'machine-label';

    /* アイコンが設定されている場合のみ表示 */
    if (m.icon) {
      const iconEl = document.createElement('div');
      iconEl.className = 'machine-icon';
      iconEl.style.background = m.iconBg;
      iconEl.textContent = m.icon;
      lbl.appendChild(iconEl);
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'machine-name';
    nameEl.textContent = m.name;
    nameEl.title = 'ダブルクリックで名前を編集';

    const editBtn = document.createElement('button');
    editBtn.className = 'machine-edit-btn';
    editBtn.title = '機械名を編集';
    editBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    editBtn.addEventListener('click', e => {
      e.stopPropagation();
      startMachineEdit(m.id, nameEl, editBtn, delBtn);
    });
    nameEl.addEventListener('dblclick', e => {
      e.stopPropagation();
      startMachineEdit(m.id, nameEl, editBtn, delBtn);
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'machine-delete-btn';
    delBtn.title = 'この機械を削除';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      deleteMachine(m.id, m.name);
    });

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    lbl.appendChild(nameEl);
    lbl.appendChild(editBtn);
    lbl.appendChild(delBtn);
    lbl.appendChild(rh);
    row.appendChild(lbl);

    /* ── タイムライン列（40列グリッド） ── */
    const tl = document.createElement('div');
    tl.className = 'timeline';

    /* 40スロット生成 */
    for (let s = 0; s < TOTAL_SLOTS; s++) {
      const slotMin  = TIME_START * 60 + s * SLOT_MIN;
      const slotH    = Math.floor(slotMin / 60);
      const slotMn   = slotMin % 60;
      const timeStr  = `${String(slotH).padStart(2,'0')}:${String(slotMn).padStart(2,'0')}`;
      // 偶数時間帯（8, 10, 12 ... 時台）を視覚的に区別
      const isEven   = (slotH % 2 === 0);

      const slotEl = document.createElement('div');
      slotEl.className = 'hour-slot';
      if (slotMn === 0)  slotEl.classList.add('at-hour');
      if (slotMn === 30) slotEl.classList.add('at-half');
      if (isEven)        slotEl.classList.add('even-hour');

      slotEl.addEventListener('click', e => {
        if (e.target.classList.contains('task-block') || e.target.closest('.task-block')) return;
        openAddModal(m.id, timeStr);
      });
      tl.appendChild(slotEl);
    }

    /* 作業ブロック配置（絶対位置：ピクセル単位） */
    currentTasks()
      .filter(t => t.machineId === m.id)
      .forEach(t => tl.appendChild(createTaskBlock(t, currentDate)));

    row.appendChild(tl);
    body.appendChild(row);
  });
}

/* ── 作業ブロック DOM 生成（複数日対応） ── */
function createTaskBlock(t, dateKey) {
  const isMulti   = t.startDate !== t.endDate;
  const isStart   = t.startDate === dateKey;
  const isEnd     = t.endDate   === dateKey;
  const dispStart = isStart ? t.start : `${String(TIME_START).padStart(2,'0')}:00`;
  const dispEnd   = isEnd   ? t.end   : `${String(TIME_END).padStart(2,'0')}:00`;

  const startSlot = timeToSlot(dispStart);
  const endSlot   = timeToSlot(dispEnd);
  const leftPx    = startSlot * SLOT_PX;
  const widthPx   = (endSlot - startSlot) * SLOT_PX;

  const block = document.createElement('button');
  block.className = `task-block color-${t.color}`;
  if (isMulti)           block.classList.add('is-multiday');
  if (isMulti && !isStart) block.classList.add('has-prev');
  if (isMulti && !isEnd)   block.classList.add('has-next');
  block.style.left     = `${leftPx + (isMulti && !isStart ? 0 : 2)}px`;
  block.style.width    = `${widthPx - (isMulti ? (isStart ? 2 : 0) + (isEnd ? 2 : 0) : 4)}px`;
  block.dataset.taskId = t.id;

  const timeLabel = isMulti
    ? `${t.startDate.slice(5).replace('-','/')}〜${t.endDate.slice(5).replace('-','/')}`
    : `${t.start}〜${t.end}`;

  block.innerHTML = `
    <div class="task-inner">
      <span class="task-name">${escHtml(t.name)}</span>
      <span class="task-time">${timeLabel}</span>
    </div>`;
  block.addEventListener('click', e => {
    e.stopPropagation();
    openDetailModal(t.id);
  });
  return block;
}

/* ═══════════════════════════════════════════════════════
   日付ナビゲーション
═══════════════════════════════════════════════════════ */
const dateInput = document.getElementById('dateInput');

function setCurrentDate(dateKey) {
  currentDate = dateKey;
  dateInput.value = dateKey;
  updateDateBadge(dateKey);
  buildChart();
}

dateInput.addEventListener('change', () => {
  if (dateInput.value) setCurrentDate(dateInput.value);
});

document.getElementById('prevDay').addEventListener('click', () => {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() - 1);
  setCurrentDate(toDateKey(d));
});

document.getElementById('nextDay').addEventListener('click', () => {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  setCurrentDate(toDateKey(d));
});

/* ═══════════════════════════════════════════════════════
   作業追加モーダル
═══════════════════════════════════════════════════════ */
function setSelectedColor(color) {
  selectedColor = color;
  document.querySelectorAll('.color-opt').forEach(o => {
    o.classList.toggle('selected', o.dataset.c === color);
  });
}

function openAddModal(machineId, startTime = slotToTimeStr(0), taskId = null) {
  if (machines.length === 0) {
    alert('先に機械を追加してください。');
    return;
  }

  const isEdit = taskId !== null;
  editingTaskId = taskId;

  document.getElementById('addModalTitle').textContent = isEdit ? '作業を編集' : '作業を追加';
  document.getElementById('addSave').textContent       = isEdit ? '変更を保存' : '追加する';
  document.getElementById('addDelete').style.display   = isEdit ? '' : 'none';

  /* 機械セレクト */
  const sel = document.getElementById('fMachine');
  sel.innerHTML = machines.map(m =>
    `<option value="${m.id}" ${m.id === machineId ? 'selected' : ''}>${escHtml(m.name)}</option>`
  ).join('');

  if (isEdit) {
    const t = allTasks.find(t => t.id === taskId);
    document.getElementById('fName').value      = t.name;
    document.getElementById('fStartDate').value = t.startDate;
    document.getElementById('fEndDate').value   = t.endDate;
    document.getElementById('fStart').value     = t.start;
    document.getElementById('fEnd').value       = t.end;
    document.getElementById('fKoban').value     = t.koban || '';
    setSelectedColor(t.color);
  } else {
    const sMin = timeToMin(startTime);
    const eMin = Math.min(sMin + 60, TIME_END * 60);
    document.getElementById('fStartDate').value = currentDate;
    document.getElementById('fEndDate').value   = currentDate;
    document.getElementById('fStart').value     = startTime;
    document.getElementById('fEnd').value       = `${String(Math.floor(eMin / 60)).padStart(2,'0')}:${String(eMin % 60).padStart(2,'0')}`;
    document.getElementById('fName').value      = '';
    document.getElementById('fKoban').value     = '';
    setSelectedColor('blue');
  }

  updateMultidayInfo();
  document.getElementById('kobanHint').textContent = '';
  clearErrors('errName', 'errTime', 'errOverlap', 'errDate');
  renderSuggests('taskNameSuggests', LS_TASK_KEY, 'fName');
  renderKobanSuggests();
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 80);
}

function closeAddModal() {
  document.getElementById('addOverlay').classList.remove('open');
  document.getElementById('fKoban').value = '';
  document.getElementById('fStartDate').value = '';
  document.getElementById('fEndDate').value   = '';
  document.getElementById('multidayInfo').textContent = '';
  document.getElementById('kobanHint').textContent = '';
  editingTaskId = null;
}

/* FAB は先頭機械の 08:00 を初期値に */
document.getElementById('fabBtn').addEventListener('click', () =>
  openAddModal(machines[0]?.id ?? '', slotToTimeStr(0)));
document.getElementById('addClose').addEventListener('click', closeAddModal);
document.getElementById('addCancel').addEventListener('click', closeAddModal);

  if (e.target === e.currentTarget) closeAddModal();
});

document.getElementById('addSave').addEventListener('click', () => {
  clearErrors('errName', 'errTime', 'errOverlap', 'errDate');

  const machineId = document.getElementById('fMachine').value;
  const name      = document.getElementById('fName').value.trim();
  const startDate = document.getElementById('fStartDate').value || currentDate;
  const endDate   = document.getElementById('fEndDate').value   || currentDate;
  const start     = document.getElementById('fStart').value;
  const end       = document.getElementById('fEnd').value;
  const koban     = document.getElementById('fKoban').value.trim();

  let ok = true;
  if (!name) { showErr('errName'); ok = false; }

  /* 日付チェック */
  if (startDate > endDate) { showErr('errDate'); ok = false; }

  /* 時刻チェック（15分境界・範囲・前後） */
  const sMin = timeToMin(start);
  const eMin = timeToMin(end);
  const validTime =
    start && end &&
    is15minAligned(start) && is15minAligned(end) &&
    sMin >= TIME_START * 60 && eMin <= TIME_END * 60 &&
    (startDate !== endDate || sMin < eMin);
  if (!validTime) { showErr('errTime'); ok = false; }

  /* 重複チェック（同機械で日付範囲が重なる作業） */
  if (ok) {
    const overlap = allTasks.some(t => {
      if (t.machineId !== machineId || t.id === editingTaskId) return false;
      if (t.endDate < startDate || t.startDate > endDate) return false;
      /* 両方が同日の単日作業の場合のみ時刻レベルでチェック */
      if (t.startDate === t.endDate && startDate === endDate && t.startDate === startDate) {
        return timeToMin(t.start) < eMin && timeToMin(t.end) > sMin;
      }
      return true;
    });
    if (overlap) { showErr('errOverlap'); ok = false; }
  }

  if (!ok) return;

  const taskData = { machineId, name, startDate, endDate, start, end, color: selectedColor, koban };
  if (editingTaskId) {
    const idx = allTasks.findIndex(t => t.id === editingTaskId);
    if (idx !== -1) allTasks[idx] = { id: editingTaskId, ...taskData };
  } else {
    allTasks.push({ id: uid(), ...taskData });
  }
  saveToHistory(LS_TASK_KEY, name);
  buildChart();
  closeAddModal();
});

document.getElementById('addDelete').addEventListener('click', () => {
  if (!editingTaskId) return;
  if (!confirm('この作業を削除しますか？')) return;
  allTasks = allTasks.filter(t => t.id !== editingTaskId);
  buildChart();
  closeAddModal();
});

function buildMachinePickers() {
  const iconPicker = document.getElementById('iconPicker');
  iconPicker.innerHTML = '';

  /* ── 先頭に「なし」ボタン（デフォルト選択） ── */
  const noneBtn = document.createElement('button');
  noneBtn.type = 'button';
  noneBtn.className = 'icon-opt icon-opt-none' + (selectedIcon === '' ? ' selected' : '');
  noneBtn.textContent = 'なし';
  noneBtn.dataset.icon = '';
  noneBtn.title = 'アイコンを表示しない';
  noneBtn.addEventListener('click', () => {
    document.querySelectorAll('.icon-opt').forEach(b => b.classList.remove('selected'));
    noneBtn.classList.add('selected');
    selectedIcon = '';
  });
  iconPicker.appendChild(noneBtn);

  /* ── 絵文字アイコン一覧 ── */
  ICON_OPTS.forEach(icon => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'icon-opt' + (icon === selectedIcon ? ' selected' : '');
    btn.textContent = icon;
    btn.dataset.icon = icon;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.icon-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedIcon = icon;
    });
    iconPicker.appendChild(btn);
  });

  const bgPicker = document.getElementById('iconBgPicker');
  bgPicker.innerHTML = '';
  ICONBG_OPTS.forEach((color, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'iconbg-opt' + (i === 0 ? ' selected' : '');
    btn.style.background = color;
    btn.dataset.bg = color;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.iconbg-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedIconBg = color;
    });
    bgPicker.appendChild(btn);
  });
}

  selectedIcon   = '';            // デフォルト「なし」

/* ═══════════════════════════════════════════════════════
   機械名インライン編集
═══════════════════════════════════════════════════════ */
function startMachineEdit(machineId, nameEl, editBtn, delBtn) {
  const m = machines.find(m => m.id === machineId);
  if (!m) return;

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'machine-name-input';
  input.value = m.name;
  input.maxLength = 20;

  /* 編集中は鉛筆・削除ボタンを隠す */
  editBtn.style.opacity = '0';
  editBtn.style.pointerEvents = 'none';
  delBtn.style.opacity  = '0';
  delBtn.style.pointerEvents = 'none';

  nameEl.replaceWith(input);
  input.focus();
  input.select();

  let committed = false;

  function commit() {
    if (committed) return;
    const newName = input.value.trim();
    if (newName && newName !== m.name) {
      if (machines.some(mm => mm.name === newName && mm.id !== machineId)) {
        input.classList.add('has-error');
        input.title = '同じ名前の機械が既に存在します';
        committed = false;
        return;
      }
      m.name = newName;
      saveToHistory(LS_MACHINE_KEY, newName);
    }
    committed = true;
    buildChart();
  }

  function cancel() {
    if (committed) return;
    committed = true;
    buildChart();
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  input.addEventListener('blur', commit);
}

/* ═══════════════════════════════════════════════════════
   機械名列リサイズ（イベントデリゲーション：全行対応）
═══════════════════════════════════════════════════════ */
const LABEL_MIN_PX = 80;
const LABEL_MAX_PX = 360;

(function initResize() {
  let activeHandle = null, startX = 0, startW = 0;

  function getLabelW() {
    return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--label-w'));
  }
  function setLabelW(px) {
    document.documentElement.style.setProperty('--label-w',
      Math.max(LABEL_MIN_PX, Math.min(LABEL_MAX_PX, px)) + 'px');
  }

  document.addEventListener('pointerdown', e => {
    const handle = e.target.closest('.resize-handle');
    if (!handle) return;
    activeHandle = handle;
    startX = e.clientX;
    startW = getLabelW();
    handle.classList.add('is-resizing');
    document.body.classList.add('col-resizing');
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  document.addEventListener('pointermove', e => {
    if (!activeHandle) return;
    setLabelW(startW + (e.clientX - startX));
  });

  function onEnd(e) {
    if (!activeHandle) return;
    activeHandle.classList.remove('is-resizing');
    document.body.classList.remove('col-resizing');
    try { activeHandle.releasePointerCapture(e.pointerId); } catch {}
    activeHandle = null;
  }
  document.addEventListener('pointerup',     onEnd);
  document.addEventListener('pointercancel', onEnd);
})();

/* ═══════════════════════════════════════════════════════
   複数日バッジ更新
═══════════════════════════════════════════════════════ */
function updateMultidayInfo() {
  const sd  = document.getElementById('fStartDate').value;
  const ed  = document.getElementById('fEndDate').value;
  const el  = document.getElementById('multidayInfo');
  if (!sd || !ed || sd === ed) { el.textContent = ''; return; }
  if (sd > ed) { el.textContent = ''; return; }
  const days = Math.round((new Date(ed + 'T00:00') - new Date(sd + 'T00:00')) / 86400000) + 1;
  el.textContent = `📅 ${days}日間の作業`;
}
document.getElementById('fStartDate').addEventListener('change', updateMultidayInfo);
document.getElementById('fEndDate').addEventListener('change', updateMultidayInfo);

/* ═══════════════════════════════════════════════════════
   工番入力ヒント（作業モーダル）
═══════════════════════════════════════════════════════ */
document.getElementById('fKoban').addEventListener('input', e => {
  const val    = e.target.value.trim();
  const hintEl = document.getElementById('kobanHint');
  if (!val) { hintEl.textContent = ''; return; }
  const master  = loadKobanMaster();
  const k       = master[val];
  const records = getKobanRecords(val);
  const avgMin  = records.length
    ? Math.round(records.reduce((s, r) => s + r.duration, 0) / records.length)
    : null;
  const parts = [];
  if (k)             parts.push(`📋 ${k.productName}`);
  if (k?.stdMin)     parts.push(`標準: ${minToHM(k.stdMin)}`);
  if (records.length) parts.push(`実績: ${records.length}回 / 平均 ${minToHM(avgMin)}`);
  hintEl.textContent = parts.join('　');
});

/* ═══════════════════════════════════════════════════════
   月次カレンダー
═══════════════════════════════════════════════════════ */
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();

function buildMonthlyView() {
  document.getElementById('monthTitle').textContent = `${calYear}年 ${calMonth + 1}月`;

  const lastDay = new Date(calYear, calMonth + 1, 0).getDate();
  const today   = toDateKey(new Date());

  /* 日付ヘッダー */
  const axis = document.getElementById('monthAxis');
  axis.innerHTML = '';
  for (let d = 1; d <= lastDay; d++) {
    const date    = new Date(calYear, calMonth, d);
    const dateKey = toDateKey(date);
    const dow     = date.getDay();
    const hdr     = document.createElement('div');
    hdr.className = 'month-day-hdr';
    if (dateKey === today)       hdr.classList.add('is-today');
    if (dateKey === currentDate) hdr.classList.add('is-selected');
    if (dow === 0) hdr.classList.add('dow-sun');
    if (dow === 6) hdr.classList.add('dow-sat');
    hdr.innerHTML = `<span class="mday-num">${d}</span><span>${'日月火水木金土'[dow]}</span>`;
    hdr.addEventListener('click', () => { setCurrentDate(dateKey); showView('timetable'); });
    axis.appendChild(hdr);
  }

  /* 機械行 */
  const body = document.getElementById('monthBody');
  body.innerHTML = '';

  if (machines.length === 0) {
    body.innerHTML = `<div class="empty-machines"><div class="empty-icon">🏗️</div><p>機械がありません。</p></div>`;
    return;
  }

  machines.forEach(m => {
    const row = document.createElement('div');
    row.className = 'month-machine-row';

    /* ラベル列（タイムテーブルと共通CSS） */
    const lbl = document.createElement('div');
    lbl.className = 'machine-label';
    if (m.icon) {
      const iconEl = document.createElement('div');
      iconEl.className = 'machine-icon';
      iconEl.style.background = m.iconBg;
      iconEl.textContent = m.icon;
      lbl.appendChild(iconEl);
    }
    const nameEl = document.createElement('div');
    nameEl.className = 'machine-name';
    nameEl.textContent = m.name;
    lbl.appendChild(nameEl);
    row.appendChild(lbl);

    /* 日ごとのスロット */
    const tl = document.createElement('div');
    tl.className = 'month-timeline-row';

    for (let d = 1; d <= lastDay; d++) {
      const date     = new Date(calYear, calMonth, d);
      const dateKey  = toDateKey(date);
      const dow      = date.getDay();
      const dayTasks = getTasksForDate(dateKey).filter(t => t.machineId === m.id);

      const slot = document.createElement('div');
      slot.className = 'month-day-slot';
      if (dateKey === today)       slot.classList.add('is-today-col');
      if (dateKey === currentDate) slot.classList.add('is-selected-col');
      if (dow === 0 || dow === 6)  slot.classList.add('is-weekend-col');

      slot.addEventListener('click', () => { setCurrentDate(dateKey); showView('timetable'); });

      dayTasks.slice(0, 3).forEach(t => {
        const chip = document.createElement('button');
        chip.className   = `month-task-chip color-${t.color}`;
        chip.textContent = t.name;
        chip.title       = `${t.name}（${t.start}〜${t.end}）`;
        chip.addEventListener('click', e => {
          e.stopPropagation();
          setCurrentDate(dateKey);
          openDetailModal(t.id);
        });
        slot.appendChild(chip);
      });

      if (dayTasks.length > 3) {
        const more = document.createElement('div');
        more.className   = 'month-task-more';
        more.textContent = `+${dayTasks.length - 3}`;
        slot.appendChild(more);
      }

      tl.appendChild(slot);
    }

    row.appendChild(tl);
    body.appendChild(row);
  });
}

document.getElementById('prevMonth').addEventListener('click', () => {
  if (--calMonth < 0) { calMonth = 11; calYear--; }
  buildMonthlyView();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  if (++calMonth > 11) { calMonth = 0; calYear++; }
  buildMonthlyView();
});
document.getElementById('monthToday').addEventListener('click', () => {
  const n = new Date();
  calYear = n.getFullYear(); calMonth = n.getMonth();
  buildMonthlyView();
});

/* ═══════════════════════════════════════════════════════
   工番マスタページ
═══════════════════════════════════════════════════════ */
let masterEditKoban = null;

function renderMasterPage(filter) {
  filter = (filter || '').toLowerCase();
  const master = loadKobanMaster();
  const rows   = Object.values(master)
    .filter(k => !filter ||
      k.koban.toLowerCase().includes(filter) ||
      k.productName.toLowerCase().includes(filter))
    .sort((a, b) => a.koban.localeCompare(b.koban, 'ja'));

  const tbody = document.getElementById('masterTableBody');
  tbody.innerHTML = '';

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="master-empty">${
      filter ? '該当する工番が見つかりません' : '工番がまだ登録されていません'
    }</td></tr>`;
    return;
  }

  rows.forEach(k => {
    const recs   = getKobanRecords(k.koban);
    const avgMin = recs.length
      ? Math.round(recs.reduce((s, r) => s + r.duration, 0) / recs.length)
      : null;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="master-koban-badge">${escHtml(k.koban)}</span></td>
      <td>${escHtml(k.productName)}</td>
      <td>${k.stdMin ? minToHM(k.stdMin) : '—'}</td>
      <td>${recs.length}回</td>
      <td>${avgMin !== null ? minToHM(avgMin) : '—'}</td>
      <td style="white-space:nowrap;text-align:right;">
        <button class="btn btn-secondary" style="padding:5px 12px;font-size:.78rem;" data-edit="${escHtml(k.koban)}">編集</button>
        <button class="btn btn-danger" style="padding:5px 12px;font-size:.78rem;margin-left:6px;" data-del="${escHtml(k.koban)}">削除</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function openMasterForm(koban) {
  masterEditKoban = koban || null;
  document.getElementById('masterFormTitle').textContent = koban ? '工番を編集' : '工番を登録';
  document.getElementById('masterFormErr').textContent   = '';
  const kobanInput = document.getElementById('mfKoban');
  if (koban) {
    const k = loadKobanMaster()[koban] || {};
    kobanInput.value   = k.koban || '';
    kobanInput.disabled = true;
    document.getElementById('mfProduct').value = k.productName || '';
    document.getElementById('mfStdMin').value  = k.stdMin ?? '';
  } else {
    kobanInput.value    = '';
    kobanInput.disabled = false;
    document.getElementById('mfProduct').value = '';
    document.getElementById('mfStdMin').value  = '';
  }
  document.getElementById('masterFormCard').classList.add('open');
  setTimeout(() => (koban ? document.getElementById('mfProduct') : kobanInput).focus(), 50);
}

function closeMasterForm() {
  document.getElementById('masterFormCard').classList.remove('open');
  masterEditKoban = null;
}

document.getElementById('masterAddBtn').addEventListener('click', () => openMasterForm());
document.getElementById('masterFormCancel').addEventListener('click', closeMasterForm);
document.getElementById('masterSearch').addEventListener('input', e => renderMasterPage(e.target.value));

document.getElementById('masterFormSave').addEventListener('click', () => {
  const koban   = document.getElementById('mfKoban').value.trim();
  const product = document.getElementById('mfProduct').value.trim();
  const stdMin  = parseInt(document.getElementById('mfStdMin').value, 10) || null;
  const errEl   = document.getElementById('masterFormErr');
  if (!koban)   { errEl.textContent = '工番を入力してください'; return; }
  if (!product) { errEl.textContent = '品名を入力してください'; return; }
  errEl.textContent = '';
  const master = loadKobanMaster();
  if (!masterEditKoban && master[koban]) {
    errEl.textContent = 'その工番はすでに登録されています'; return;
  }
  const key   = masterEditKoban || koban;
  master[key] = { koban: key, productName: product, stdMin };
  saveKobanMaster(master);
  closeMasterForm();
  renderMasterPage(document.getElementById('masterSearch').value);
});

document.getElementById('masterTableBody').addEventListener('click', e => {
  const ed  = e.target.closest('[data-edit]');
  const del = e.target.closest('[data-del]');
  if (ed) {
    openMasterForm(ed.dataset.edit);
  } else if (del) {
    const koban = del.dataset.del;
    if (!confirm(`「${koban}」を削除しますか？\n（作業ブロックの工番情報は残ります）`)) return;
    const master = loadKobanMaster();
    delete master[koban];
    saveKobanMaster(master);
    renderMasterPage(document.getElementById('masterSearch').value);
  }
});

/* ═══════════════════════════════════════════════════════
   ビュー切替
═══════════════════════════════════════════════════════ */
function showView(name) {
  ['timetable','monthly','master'].forEach(v => {
    const el = document.getElementById('view-' + v);
    if (el) el.hidden = (v !== name);
  });
  document.querySelectorAll('.nav-tab').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.view === name));
  document.getElementById('fabBtn').style.display = name === 'timetable' ? '' : 'none';
  if (name === 'monthly') buildMonthlyView();
  if (name === 'master')  renderMasterPage(document.getElementById('masterSearch').value);
}

document.querySelectorAll('.nav-tab').forEach(btn =>
  btn.addEventListener('click', () => showView(btn.dataset.view)));

   初期化
═══════════════════════════════════════════════════════ */
buildTimeAxis();              // 時間軸は固定なので一度だけ
setCurrentDate(currentDate);  // 日付バッジ・dateInput・チャートを一括セット
